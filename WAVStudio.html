<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Explorer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(255, 255, 255, 0.2);
            --accent: #8b5cf6; /* Violet */
            --accent-hover: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --player-height: 90px;
            --panel-width: 800px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(139, 92, 246, 0.12), transparent 40%),
                radial-gradient(circle at 85% 70%, rgba(59, 130, 246, 0.12), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header & Controls --- */
        header {
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-bar {
            position: relative;
        }

        .search-bar input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px 10px 40px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            width: 250px;
        }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .search-bar svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-muted);
            width: 16px;
            height: 16px;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-highlight);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        #folderInput {
            display: none;
        }

        .vis-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px 36px 8px 16px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%24%2024%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            transition: all 0.2s ease;
        }

        .vis-select:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .vis-select option {
            background: #09090b;
            color: white;
        }

        /* --- Main Layout --- */
        main.main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding-bottom: var(--player-height);
        }

        .grid-section {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        /* --- Transcript Panel --- */
        .transcript-panel {
            width: 0;
            opacity: 0;
            border-left: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            flex-shrink: 0;
        }

        .transcript-panel.visible {
            width: var(--panel-width);
            opacity: 1;
        }

        .transcript-panel.resizing {
            transition: none !important;
        }

        .resizer {
            width: 6px;
            margin-left: -3px;
            margin-right: -3px;
            cursor: ew-resize;
            background: transparent;
            z-index: 10;
            display: none;
            flex-shrink: 0;
            position: relative;
            transition: background 0.2s;
        }

        .resizer.visible {
            display: block;
        }

        .resizer:hover, .resizer.dragging {
            background: var(--accent);
        }

        .transcript-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .transcript-header svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        .transcript-header h3 {
            flex: 1;
            font-weight: 600;
            color: var(--text-main);
        }

        .close-panel {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-panel:hover {
            color: var(--text-main);
            background: var(--surface);
        }

        .close-panel svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .transcript-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Markdown Typography */
        .markdown-body {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--text-main);
            margin-bottom: 16px;
            margin-top: 24px;
            font-weight: 600;
        }
        .markdown-body h1:first-child, .markdown-body h2:first-child { margin-top: 0; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body strong { color: var(--text-main); }
        .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 20px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            color: var(--text-muted);
            font-style: italic;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 16px;
        }
        .markdown-body code {
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--text-main);
        }
        .markdown-body pre {
            background: var(--surface);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            max-width: 400px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            fill: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state h2 {
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: none; /* hidden initially */
        }

        /* --- Grid & Tiles --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: tileEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
            will-change: transform, box-shadow;
        }

        @keyframes tileEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tile:hover {
            transform: translateY(-4px);
            background: var(--surface-hover);
            border-color: var(--border-highlight);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tile.active {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .tile.playing {
            transform: scale(var(--beat-scale, 1.02)) translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 var(--beat-glow, 20px) var(--accent-glow);
            border-color: var(--accent-hover);
            background: rgba(139, 92, 246, 0.15);
            transition: background 0.3s, border-color 0.3s, transform 0.05s ease-out, box-shadow 0.05s ease-out;
        }
        
        .tile.playing .tile-icon-wrapper {
            transform: scale(var(--beat-scale, 1.05));
            box-shadow: 0 0 calc(var(--beat-glow, 10px) * 0.5) var(--accent);
            transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
        }

        .has-transcript {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            z-index: 2;
            transition: all 0.3s ease;
        }

        .tile:hover .has-transcript {
            background: var(--accent);
            color: white;
        }

        .has-transcript svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .tile-icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .tile:hover .tile-icon-wrapper {
            background: var(--accent);
            transform: scale(1.05);
        }
        
        .tile.active .tile-icon-wrapper {
            background: var(--accent);
        }

        .tile-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: var(--text-main);
            margin-left: 2px;
        }

        .tile-info h4 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        /* Playing Animation */
        .bars-anim {
            display: none;
            gap: 3px;
            height: 20px;
            align-items: flex-end;
        }
        
        .tile.playing .tile-icon-wrapper svg {
            display: none;
        }
        .tile.playing .bars-anim {
            display: flex;
        }
        
        .bar {
            width: 3px;
            background: white;
            border-radius: 2px;
            animation: bounce 1s infinite ease-in-out alternate;
        }
        .bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 100%; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 60%; animation-delay: 0.6s; }

        @keyframes bounce {
            0% { height: 20%; }
            100% { height: 100%; }
        }

        /* --- Footer Player --- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--player-height);
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        footer.visible {
            transform: translateY(0);
        }

        .player-left, .player-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .player-right {
            justify-content: flex-end;
            gap: 16px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
            overflow: hidden;
            padding-right: 20px;
        }

        .np-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--accent-glow);
            flex-shrink: 0;
            will-change: transform, box-shadow;
            transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
        }
        .np-icon.playing {
            transform: scale(var(--beat-scale, 1.05));
            box-shadow: 0 4px calc(15px + var(--beat-glow, 0px) * 0.5) var(--accent-glow);
        }
        
        .np-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .np-info {
            min-width: 0;
        }

        .np-info h4 {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .np-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .player-center {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 8px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 8px;
            border-radius: 50%;
        }

        .ctrl-btn:hover {
            color: var(--text-main);
            background: var(--surface);
        }

        .ctrl-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .ctrl-btn.active {
            color: var(--accent);
        }

        .transcript-toggle {
            margin-left: 8px;
            color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 6px 12px;
            border-radius: 16px;
            gap: 6px;
        }
        .transcript-toggle span {
            font-size: 13px;
            font-weight: 500;
        }
        .transcript-toggle:hover {
            background: rgba(139, 92, 246, 0.2);
            color: var(--text-main);
        }
        .transcript-toggle.active {
            background: var(--accent);
            color: white;
        }

        .play-pause-btn {
            width: 40px;
            height: 40px;
            background: var(--text-main);
            color: var(--bg-color);
        }

        .play-pause-btn:hover {
            background: white;
            transform: scale(1.05);
            color: var(--bg-color);
        }

        .play-pause-btn svg {
            width: 24px;
            height: 24px;
            margin-left: 2px;
        }
        
        .play-pause-btn.is-playing svg {
            margin-left: 0;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--surface-hover);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            position: relative;
        }
        
        .slider::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }
        
        .progress-wrapper:hover .slider::-webkit-slider-thumb {
            opacity: 1;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            pointer-events: none;
            width: 0%;
        }

        .speed-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speed-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
        }

        .speed-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
        }

        /* --- Audio Visualizer Canvas --- */
        #visualizer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--surface-hover);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-highlight);
        }
        
        /* Drag and drop overlay */
        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 4px dashed var(--accent);
            margin: 20px;
            border-radius: 24px;
        }
        
        .drag-overlay.active {
            opacity: 1;
        }
        
        .drag-overlay h2 {
            font-size: 2rem;
            margin-top: 20px;
            color: var(--accent);
        }

        @media (max-width: 900px) {
            .player-left { flex: 0.8; }
            .player-right { flex: 0.8; }

            .transcript-panel.visible { width: 320px; }
        }
    </style>
</head>
<body>

    <!-- Drag & Drop Overlay -->
    <div class="drag-overlay" id="dragOverlay">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="var(--accent)"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <h2>Drop Folder Here</h2>
    </div>

    <!-- Visualizer Background -->
    <canvas id="visualizer"></canvas>

    <header>
        <div class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            WAV Studio
        </div>
        <div class="header-controls">
            <div class="search-bar">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Search files..." disabled>
            </div>
            <select id="visSelect" class="vis-select">
                <option value="0">Bars (Symmetric)</option>
                <option value="1">LED (Matrix)</option>
                <option value="2" selected>Agent (AI Ring)</option>
            </select>
            <button class="btn btn-primary" onclick="document.getElementById('folderInput').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                Open Folder
            </button>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>
    </header>

    <main class="main-container">
        <div class="grid-section">
            <div class="stats-bar" id="statsBar">
                <span id="fileCount">0 files loaded</span>
                <span id="folderName"></span>
            </div>

            <div id="emptyState" class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                <h2>No Folder Selected</h2>
                <p>Click "Open Folder" or drag and drop a directory containing .wav and .md files here to begin.</p>
            </div>

            <div class="grid" id="grid">
                <!-- Tiles will be generated here -->
            </div>
        </div>
        
        <div class="resizer" id="resizer"></div>
        <aside class="transcript-panel" id="transcriptPanel">
            <div class="transcript-header">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <h3>Transcript</h3>
                <button class="close-panel" id="btnCloseTranscript" title="Close Transcript">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="transcript-content markdown-body" id="transcriptContent">
                <!-- Markdown content here -->
            </div>
        </aside>
    </main>

    <footer id="player">
        <audio id="audioElement"></audio>
        
        <div class="player-left">
            <div class="now-playing">
                <div class="np-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <div class="np-info">
                    <h4 id="npTitle">Select a track</h4>
                    <p id="npFormat">WAV Audio</p>
                </div>
                <button class="ctrl-btn transcript-toggle" id="btnToggleTranscript" style="display: none;" title="Toggle Transcript">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <span>Transcript</span>
                </button>
            </div>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button class="ctrl-btn" id="btnShuffle" title="Shuffle">
                    <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                </button>
                <button class="ctrl-btn" id="btnPrev" title="Previous">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn play-pause-btn" id="btnPlayPause" title="Play/Pause">
                    <!-- Play icon by default -->
                    <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause icon hidden initially -->
                    <svg id="iconPause" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="ctrl-btn" id="btnNext" title="Next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button class="ctrl-btn" id="btnRepeat" title="Repeat">
                    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            
            <div class="progress-container">
                <span id="timeCurrent">0:00</span>
                <div class="progress-wrapper">
                    <input type="range" class="slider" id="progressSlider" min="0" max="100" value="0" step="0.1">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span id="timeTotal">0:00</span>
            </div>
        </div>

        <div class="player-right speed-controls">
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="1.25">1.25x</button>
            <button class="speed-btn" data-speed="1.5">1.5x</button>
            <button class="speed-btn" data-speed="1.75">1.75x</button>
            <button class="speed-btn" data-speed="2">2x</button>
        </div>
    </footer>

    <script>
        // DOM Elements
        const folderInput = document.getElementById('folderInput');
        const searchInput = document.getElementById('searchInput');
        const grid = document.getElementById('grid');
        const emptyState = document.getElementById('emptyState');
        const statsBar = document.getElementById('statsBar');
        const fileCountEl = document.getElementById('fileCount');
        const folderNameEl = document.getElementById('folderName');
        const dragOverlay = document.getElementById('dragOverlay');
        
        // Transcript Elements
        const transcriptPanel = document.getElementById('transcriptPanel');
        const transcriptContent = document.getElementById('transcriptContent');
        const btnToggleTranscript = document.getElementById('btnToggleTranscript');
        const btnCloseTranscript = document.getElementById('btnCloseTranscript');

        // Player Elements
        const audio = document.getElementById('audioElement');
        const player = document.getElementById('player');
        const npTitle = document.getElementById('npTitle');
        const npIcon = document.querySelector('.np-icon');
        const btnPlayPause = document.getElementById('btnPlayPause');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnShuffle = document.getElementById('btnShuffle');
        const btnRepeat = document.getElementById('btnRepeat');
        const progressSlider = document.getElementById('progressSlider');
        const progressFill = document.getElementById('progressFill');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');
        const speedBtns = document.querySelectorAll('.speed-btn');

        // State
        let allFiles = []; // Array of { name, wav: File, md: File }
        let filteredFiles = [];
        let currentIndex = -1;
        let isShuffle = false;
        let repeatMode = 0; // 0: no, 1: all, 2: one
        let audioContext, analyser, source, dataArray;
        let isVisualizerInit = false;
        const durationCache = new Map();
        // Load Audio Files
        folderInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        // Drag and drop handlers
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragOverlay.classList.add('active');
        });
        
        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.clientX === 0 || e.clientY === 0) {
                dragOverlay.classList.remove('active');
            }
        });
        
        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
            
            const items = e.dataTransfer.items;
            const files = [];
            
            if (items) {
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === 'file') {
                        const entry = item.webkitGetAsEntry();
                        if (entry) {
                            await traverseFileTree(entry, files);
                        }
                    }
                }
                handleFiles(files);
            }
        });

        async function traverseFileTree(item, files) {
            if (item.isFile) {
                const file = await new Promise(resolve => item.file(resolve));
                files.push(file);
            } else if (item.isDirectory) {
                const dirReader = item.createReader();
                const entries = await new Promise(resolve => {
                    dirReader.readEntries(resolve);
                });
                for (let i = 0; i < entries.length; i++) {
                    await traverseFileTree(entries[i], files);
                }
            }
        }

        function handleFiles(filesArray) {
            const files = Array.from(filesArray);
            const groups = {};
            
            // Group files by base name
            files.forEach(file => {
                const lowerName = file.name.toLowerCase();
                if (lowerName.endsWith('.wav') || lowerName.endsWith('.md')) {
                    const lastDot = file.name.lastIndexOf('.');
                    const baseName = file.name.substring(0, lastDot);
                    
                    if (!groups[baseName]) {
                        groups[baseName] = { name: baseName, wav: null, md: null };
                    }
                    
                    if (lowerName.endsWith('.wav')) {
                        groups[baseName].wav = file;
                    } else if (lowerName.endsWith('.md')) {
                        groups[baseName].md = file;
                    }
                }
            });
            
            // Filter only groups that have a WAV file
            allFiles = Object.values(groups).filter(g => g.wav !== null);
            
            // Sort alphabetically by name
            allFiles.sort((a, b) => a.name.localeCompare(b.name));
            filteredFiles = [...allFiles];

            if (allFiles.length > 0) {
                emptyState.style.display = 'none';
                statsBar.style.display = 'flex';
                searchInput.disabled = false;
                
                fileCountEl.textContent = `${allFiles.length} Audio Tracks • Calculating total time...`;
                
                let totalDuration = 0;
                let loadedCount = 0;
                
                allFiles.forEach(item => {
                    const url = URL.createObjectURL(item.wav);
                    const tempAudio = new Audio(url);
                    const checkComplete = () => {
                        loadedCount++;
                        URL.revokeObjectURL(url);
                        if (loadedCount === allFiles.length) {
                            const h = Math.floor(totalDuration / 3600);
                            const m = Math.floor((totalDuration % 3600) / 60);
                            const s = Math.floor(totalDuration % 60);
                            const timeStr = h > 0 ? `${h}h ${m}m` : `${m}m ${s}s`;
                            fileCountEl.textContent = `Audio Tracks: ${allFiles.length} | Total Time: ${timeStr}`;
                        }
                    };
                    tempAudio.addEventListener('loadedmetadata', () => {
                        totalDuration += tempAudio.duration || 0;
                        checkComplete();
                    });
                    tempAudio.addEventListener('error', checkComplete);
                });
                const pathParts = allFiles[0].wav.webkitRelativePath.split('/');
                folderNameEl.textContent = pathParts.length > 1 ? pathParts[0] : 'Root Folder';

                renderGrid(filteredFiles);
                player.classList.add('visible');
            } else {
                alert('No WAV files found in the selected folder.');
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function renderGrid(files) {
            grid.innerHTML = '';
            files.forEach((item) => {
                const originalIndex = allFiles.findIndex(f => f === item);
                const file = item.wav;
                
                const tile = document.createElement('div');
                tile.className = 'tile';
                const delay = Math.min(originalIndex * 0.05, 1.5);
                tile.style.animationDelay = `${delay}s`;
                tile.dataset.index = originalIndex;
                tile.onclick = () => playTrack(originalIndex);
                
                if (originalIndex === currentIndex) {
                    tile.classList.add('active');
                    if (!audio.paused) tile.classList.add('playing');
                }

                const mdIcon = item.md ? 
                    `<div class="has-transcript" title="Has Transcript"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></div>` : '';

                tile.innerHTML = `
                    ${mdIcon}
                    <div class="tile-icon-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <div class="bars-anim">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                    <div class="tile-info">
                        <h4 title="${item.name}">${item.name}</h4>
                        <p class="track-duration" id="dur-${originalIndex}">--:--</p>
                    </div>
                `;
                grid.appendChild(tile);
                
                const durEl = tile.querySelector(`#dur-${originalIndex}`);
                if (durationCache.has(item.name)) {
                    durEl.textContent = durationCache.get(item.name);
                } else {
                    const url = URL.createObjectURL(file);
                    const tempAudio = new Audio();
                    tempAudio.addEventListener('loadedmetadata', () => {
                        const durStr = formatTime(tempAudio.duration);
                        durationCache.set(item.name, durStr);
                        if (durEl) durEl.textContent = durStr;
                        URL.revokeObjectURL(url);
                    });
                    tempAudio.addEventListener('error', () => {
                        if (durEl) durEl.textContent = "Error";
                        URL.revokeObjectURL(url);
                    });
                    tempAudio.src = url;
                }
            });
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredFiles = allFiles.filter(item => item.name.toLowerCase().includes(term));
            renderGrid(filteredFiles);
        });

        // Transcript Panel Toggling
        const resizer = document.getElementById('resizer');
        const mainContainer = document.querySelector('.main-container');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            transcriptPanel.classList.add('resizing');
            resizer.classList.add('dragging');
            document.body.style.cursor = 'ew-resize';
            e.preventDefault(); // prevent text selection
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerRect = mainContainer.getBoundingClientRect();
            let newWidth = containerRect.right - e.clientX;
            
            // Constrain width
            if (newWidth < 300) newWidth = 300;
            if (newWidth > window.innerWidth * 0.8) newWidth = window.innerWidth * 0.8;
            
            document.documentElement.style.setProperty('--panel-width', `${newWidth}px`);
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                transcriptPanel.classList.remove('resizing');
                resizer.classList.remove('dragging');
                document.body.style.cursor = 'default';
            }
        });

        btnToggleTranscript.addEventListener('click', () => {
            transcriptPanel.classList.toggle('visible');
            resizer.classList.toggle('visible', transcriptPanel.classList.contains('visible'));
            btnToggleTranscript.classList.toggle('active', transcriptPanel.classList.contains('visible'));
        });

        btnCloseTranscript.addEventListener('click', () => {
            transcriptPanel.classList.remove('visible');
            resizer.classList.remove('visible');
            btnToggleTranscript.classList.remove('active');
        });

        function loadTranscript(mdFile) {
            if (!mdFile) {
                transcriptPanel.classList.remove('visible');
                resizer.classList.remove('visible');
                btnToggleTranscript.style.display = 'none';
                btnToggleTranscript.classList.remove('active');
                transcriptContent.innerHTML = '';
                return;
            }

            btnToggleTranscript.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                // Parse markdown if marked is loaded via CDN, else plain text fallback
                if (typeof marked !== 'undefined') {
                    transcriptContent.innerHTML = marked.parse(text);
                } else {
                    transcriptContent.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit;">${text}</pre>`;
                }
                
                // Keep transcript closed by default; user can toggle it manually via the Transcript button

            };
            reader.readAsText(mdFile);
        }

        // Audio Playback
        function playTrack(index) {
            if (index < 0 || index >= allFiles.length) return;
            
            const isSameTrack = (currentIndex === index);
            currentIndex = index;
            const item = allFiles[currentIndex];
            const file = item.wav;
            
            if (isSameTrack) {
                togglePlayPause();
                return;
            }

            const objectUrl = URL.createObjectURL(file);
            audio.src = objectUrl;
            
            npTitle.textContent = item.name;
            npTitle.title = item.name;
            
            audio.play().then(() => {
                initVisualizer();
            }).catch(e => console.error("Playback failed:", e));
            
            updateGridState();
            loadTranscript(item.md);
        }

        function updateGridState() {
            document.querySelectorAll('.tile').forEach(tile => {
                tile.classList.remove('active', 'playing');
                if (parseInt(tile.dataset.index) === currentIndex) {
                    tile.classList.add('active');
                    if (!audio.paused) tile.classList.add('playing');
                }
            });
        }

        function togglePlayPause() {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        function playNext() {
            if (allFiles.length === 0) return;
            let nextIndex = currentIndex + 1;
            if (isShuffle) {
                nextIndex = Math.floor(Math.random() * allFiles.length);
            } else if (nextIndex >= allFiles.length) {
                nextIndex = 0; // loop back
            }
            playTrack(nextIndex);
        }

        function playPrev() {
            if (allFiles.length === 0) return;
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                return;
            }
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = allFiles.length - 1;
            playTrack(prevIndex);
        }

        // Controls Event Listeners
        btnPlayPause.addEventListener('click', togglePlayPause);
        btnNext.addEventListener('click', playNext);
        btnPrev.addEventListener('click', playPrev);
        
        btnShuffle.addEventListener('click', () => {
            isShuffle = !isShuffle;
            btnShuffle.classList.toggle('active', isShuffle);
        });

        btnRepeat.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                btnRepeat.classList.remove('active');
                btnRepeat.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
            } else if (repeatMode === 1) {
                btnRepeat.classList.add('active');
                btnRepeat.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
            } else {
                btnRepeat.classList.add('active');
                // Repeat one icon
                btnRepeat.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>';
            }
        });

        // Audio Events
        audio.addEventListener('play', () => {
            btnPlayPause.classList.add('is-playing');
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            npIcon.classList.add('playing');
            updateGridState();
        });

        audio.addEventListener('pause', () => {
            btnPlayPause.classList.remove('is-playing');
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
            npIcon.classList.remove('playing');
            updateGridState();
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration || !isFinite(audio.duration)) return;
            const progress = (audio.currentTime / audio.duration) * 100;
            progressSlider.value = progress;
            progressFill.style.width = `${progress}%`;
            timeCurrent.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            if (isFinite(audio.duration)) {
                timeTotal.textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.play(); // repeat one
            } else if (repeatMode === 1) {
                playNext(); // repeat all
            } else {
                // Stop playing instead of going to the next track by default
                updateGridState();
                btnPlayPause.classList.remove('is-playing');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                npIcon.classList.remove('playing');
            }
        });

        // Progress Slider
        progressSlider.addEventListener('input', (e) => {
            if (!audio.duration || !isFinite(audio.duration)) return;
            const time = (e.target.value / 100) * audio.duration;
            audio.currentTime = time;
            progressFill.style.width = `${e.target.value}%`;
        });

        // Speed Controls
        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                audio.playbackRate = parseFloat(btn.dataset.speed);
            });
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Ignore if typing in search
            if (document.activeElement === searchInput) return;

            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                if (isFinite(audio.duration)) {
                    audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                audio.currentTime = Math.max(0, audio.currentTime - 5);
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                playNext();
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                playPrev();
            }
        });

        // Visualizer Setup
        function initVisualizer() {
            if (isVisualizerInit) return;
            isVisualizerInit = true;

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                ctx.scale(dpr, dpr);
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
            window.addEventListener('resize', resize);
            resize();

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                source = audioContext.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                const timeDomainData = new Uint8Array(bufferLength);
                
                let currentBass = 0, currentMid = 0, currentTreble = 0;
                
                let currentVisMode = 2;
                
                const visSelect = document.getElementById('visSelect');
                if (visSelect) {
                    visSelect.addEventListener('change', (e) => {
                        currentVisMode = parseInt(e.target.value);
                    });
                }

                function draw() {
                    requestAnimationFrame(draw);
                    if (audio.paused && !audio.ended) return;
                    
                    const w = window.innerWidth;
                    const h = window.innerHeight;

                    analyser.getByteFrequencyData(dataArray);
                    analyser.getByteTimeDomainData(timeDomainData);
                    
                    ctx.fillStyle = '#050505'; 
                    ctx.fillRect(0, 0, w, h);
                    
                    let bassSum = 0, midSum = 0, trebleSum = 0;
                    let overallSum = 0;
                    
                    for(let i = 0; i < bufferLength; i++) {
                        const val = dataArray[i] / 255.0;
                        overallSum += dataArray[i];
                        if (i < bufferLength * 0.1) bassSum += val;
                        else if (i < bufferLength * 0.4) midSum += val;
                        else trebleSum += val;
                    }
                    
                    const bassTarget = bassSum / (bufferLength * 0.1);
                    const midTarget = midSum / (bufferLength * 0.3);
                    const trebleTarget = trebleSum / (bufferLength * 0.6);
                    
                    currentBass += (bassTarget - currentBass) * 0.1;
                    currentMid += (midTarget - currentMid) * 0.1;
                    currentTreble += (trebleTarget - currentTreble) * 0.15;
                    
                    const time = Date.now() / 2000;
                    const centerY = h * 0.85;
                    
                    const gradient = ctx.createLinearGradient(0, 0, w, 0);
                    gradient.addColorStop(0, '#3b82f6');   // Blue
                    gradient.addColorStop(0.2, '#06b6d4'); // Cyan
                    gradient.addColorStop(0.4, '#10b981'); // Green
                    gradient.addColorStop(0.6, '#eab308'); // Yellow
                    gradient.addColorStop(0.8, '#f97316'); // Orange
                    gradient.addColorStop(1, '#ef4444');   // Red
                    
                    if (currentVisMode === 0) {
                        // 1. Symmetric Classic Bars
                        const numBars = 64; 
                        const barWidth = (w / numBars) * 0.4;
                        const gap = (w / numBars) * 0.6;
                        
                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = 'rgba(255,255,255,0.1)';
                        
                        for (let i = 0; i < numBars; i++) {
                            let val = dataArray[i];
                            if (i > 0 && i < bufferLength-1) val = (dataArray[i-1] + dataArray[i] + dataArray[i+1])/3;
                            
                            const height = (val / 255.0) * h * 0.5;
                            const xLeft = (w / 2) - (i * (barWidth + gap)) - barWidth;
                            const xRight = (w / 2) + (i * (barWidth + gap));
                            
                            if (height > 0) {
                                ctx.beginPath();
                                ctx.roundRect(xLeft, centerY - height/2 - (h*0.1), barWidth, Math.max(height, 4), barWidth/2);
                                ctx.fill();
                                
                                ctx.beginPath();
                                ctx.roundRect(xRight, centerY - height/2 - (h*0.1), barWidth, Math.max(height, 4), barWidth/2);
                                ctx.fill();
                            }
                        }
                        ctx.shadowBlur = 0;
                        
                    } else if (currentVisMode === 1) {
                        // 2. LED Blocks
                        const numCols = Math.floor(w / 30);
                        const numRows = 25;
                        const boxSize = (w / numCols) * 0.6;
                        const gapX = (w / numCols) * 0.4;
                        const totalBoxH = boxSize + (boxSize * 0.4);
                        
                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = 'rgba(255,255,255,0.15)';
                        
                        const startY = h * 0.9;
                        
                        for (let i = 0; i < numCols; i++) {
                            const pct = Math.abs((i / numCols) - 0.5) * 2; 
                            const dataIdx = Math.floor((1.0 - pct) * (bufferLength/2));
                            let val = dataArray[dataIdx] / 255.0; 
                            if (val < 0.05) val = 0.05; // Base tiny bump
                            
                            const activeRows = Math.floor(val * numRows);
                            const x = i * (boxSize + gapX) + gapX/2;
                            
                            for (let r = 0; r < numRows; r++) {
                                const y = startY - (r * totalBoxH);
                                if (r < activeRows) {
                                    ctx.globalAlpha = 1.0;
                                    ctx.fillRect(x, y, boxSize, boxSize);
                                } else {
                                    ctx.globalAlpha = 0.1;
                                    ctx.fillRect(x, y, boxSize, boxSize);
                                }
                            }
                        }
                        ctx.globalAlpha = 1.0;
                        ctx.shadowBlur = 0;
                        
                    } else if (currentVisMode === 2) {
                        // 3. Agent (Immersive AI Plasma Orb with Ethereal Dust)
                        const centerX = w / 2;
                        const centerYPos = h / 2;
                        
                        // Base size dynamically reacts to overall volume
                        const audioScale = currentBass * 0.6 + currentMid * 0.4; 
                        
                        // Global Entity Scale - smoothly breathes and grows based on sound strength
                        // This makes the entire orb feel like a single living person expanding and contracting
                        const entityScale = 1.0 + (audioScale * 0.8);
                        
                        const baseRadius = Math.min(w, h) * 0.2; 
                        
                        ctx.globalCompositeOperation = 'screen';
                        
                        // 1. Immersive deep background pulse
                        const bgRadius = Math.max(w, h) * 0.6;
                        const bgGrad = ctx.createRadialGradient(centerX, centerYPos, 0, centerX, centerYPos, bgRadius);
                        const bgAlpha = 0.05 + (currentBass * 0.15 * entityScale);
                        bgGrad.addColorStop(0, `rgba(59, 130, 246, ${bgAlpha})`); 
                        bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                        ctx.fillStyle = bgGrad;
                        ctx.fillRect(0, 0, w, h);
                        
                        // 2. The requested premium color palette for the liquid plasma
                        const colors = [
                            { r: 59, g: 130, b: 246 },  // Blue
                            { r: 6, g: 182, b: 212 },   // Cyan
                            { r: 16, g: 185, b: 129 },  // Green
                            { r: 234, g: 179, b: 8 },   // Yellow
                            { r: 249, g: 115, b: 22 },  // Orange
                            { r: 239, g: 68, b: 68 }    // Red
                        ];
                        
                        const numOrbs = colors.length;
                        
                        for (let j = 0; j < numOrbs; j++) {
                            const c = colors[j];
                            
                            // To perfectly preserve the requested color scheme, map them to a strict circle
                            const angle = (j / numOrbs) * Math.PI * 2 + time * 0.8;
                            
                            // The entire orb cluster scales cohesively as one single entity
                            const spread = baseRadius * 0.25 * entityScale;
                            
                            // Add a subtle wobble so it feels organic, but they stay in their distinct color quadrant
                            const wobble = Math.sin(time * 2 + j) * baseRadius * 0.05 * entityScale;
                            
                            const orbX = centerX + Math.cos(angle) * (spread + wobble);
                            const orbY = centerYPos + Math.sin(angle) * (spread + wobble);
                            
                            // Each color blob scales with different frequency bands to feel "alive", multiplied by global scale
                            let freqScale = currentMid;
                            if (j % 3 === 0) freqScale = currentBass;
                            if (j % 3 === 2) freqScale = currentTreble;
                            
                            const orbRadius = baseRadius * 0.6 * entityScale + (freqScale * baseRadius * 0.4);
                            
                            const grad = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbRadius);
                            grad.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, 0.9)`);
                            grad.addColorStop(0.4, `rgba(${c.r}, ${c.g}, ${c.b}, 0.4)`);
                            grad.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`);
                            
                            ctx.beginPath();
                            ctx.arc(orbX, orbY, orbRadius, 0, Math.PI * 2);
                            ctx.fillStyle = grad;
                            ctx.fill();
                        }
                        
                        // 3. Ethereal Dust (Audio-reactive particles)
                        const numDust = 80;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                        for(let i=0; i<numDust; i++) {
                            // Pseudo-random deterministic placement and movement
                            const angle = (i * 13.7) + time * (0.1 + (i % 5) * 0.05);
                            
                            // Distance from center pushes out smoothly with the entire entity
                            const distBase = baseRadius * 1.2 * entityScale + (i * 3);
                            const distExpand = currentBass * baseRadius * 0.5 * entityScale;
                            const dist = distBase + distExpand * Math.sin(i * 9.3 + time);
                            
                            const x = centerX + Math.cos(angle) * dist;
                            const y = centerYPos + Math.sin(angle) * dist;
                            
                            // Size reacts to treble for a sparkling effect
                            const size = 0.5 + (i % 2) + currentTreble * 2.5;
                            
                            ctx.globalAlpha = 0.3 + 0.7 * Math.abs(Math.sin(i * 11 + time * 2)); // Twinkle
                            ctx.beginPath();
                            ctx.arc(x, y, size, 0, Math.PI*2);
                            ctx.fill();
                        }
                        ctx.globalAlpha = 1.0;
                        ctx.shadowBlur = 0;
                        
                        // 4. Central intensely glowing core that breathes cohesively with the rest
                        const coreRadius = baseRadius * 0.25 * entityScale;
                        const coreGrad = ctx.createRadialGradient(centerX, centerYPos, 0, centerX, centerYPos, coreRadius);
                        // Core is slightly cyan-white for a high-tech sci-fi feel
                        coreGrad.addColorStop(0, 'rgba(240, 252, 255, 1)');
                        coreGrad.addColorStop(0.4, 'rgba(180, 230, 255, 0.6)');
                        coreGrad.addColorStop(1, 'rgba(180, 230, 255, 0)');
                        
                        ctx.beginPath();
                        ctx.arc(centerX, centerYPos, coreRadius, 0, Math.PI * 2);
                        ctx.fillStyle = coreGrad;
                        ctx.fill();
                        
                        ctx.globalCompositeOperation = 'source-over';
                    }
                    
                    const avg = overallSum / bufferLength;
                    const beatScale = 1 + (avg / 255) * 0.04;
                    const glow = (avg / 255) * 60; 
                    
                    document.documentElement.style.setProperty('--beat-scale', beatScale);
                    document.documentElement.style.setProperty('--beat-glow', `${glow}px`);
                }
                draw();
            } catch (e) {
                console.warn("Web Audio API visualizer could not be initialized:", e);
            }
        }
    </script>
</body>
